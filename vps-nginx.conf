# Nginx для revyakin.tech на VPS (без Docker).
# Раздаёт собранную статику из /var/www/revyakin напрямую. SSL — Let's Encrypt.
#
# Установка на сервере:
#   sudo cp vps-nginx.conf /etc/nginx/sites-available/revyakin.tech
#   sudo ln -s /etc/nginx/sites-available/revyakin.tech /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name revyakin.tech www.revyakin.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name revyakin.tech www.revyakin.tech;

    ssl_certificate /etc/letsencrypt/live/revyakin.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/revyakin.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/revyakin;
    index index.html;

    # Сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # SPA: все маршруты отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html не кешируем (ссылается на хешированные ассеты)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Ассеты с хешем в имени — кешируем надолго
    location ~* \.(?:js|css|woff2?|png|jpe?g|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
